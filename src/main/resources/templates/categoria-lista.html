<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Categorias</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background-color: #007bff;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .acoes a {
            margin: 0 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .editar {
            color: #28a745;
        }

        .excluir {
            color: #dc3545;
        }

        .novo {
            display: block;
            width: 220px;
            margin: 20px auto;
            text-align: center;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Lista de Categorias</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Acoes</th>
        </tr>

        <tr th:each="categoria : ${categorias}">
            <td th:text="${categoria.id}"></td>
            <td th:text="${categoria.nome}"></td>
            <td class="acoes">
                <a class="editar" th:href="@{/categoria/editar/{id}(id=${categoria.id})}">Editar</a>
                <a class="excluir" th:href="@{/categoria/deletar/{id}(id=${categoria.id})}">Excluir</a>
            </td>
        </tr>
    </table>

    <a class="novo" href="/categoria/formulario">+ Nova Categoria</a>
    <a class="novo" href="/produto/listar">Produtos</a>
</div>
</body>
</html>
