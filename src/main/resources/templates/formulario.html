<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .botoes {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        input[type="submit"] {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="reset"] {
            background-color: #dc3545;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #218838;
        }

        input[type="reset"]:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>Cadastro de Produto</h2>

    <form method="POST" th:action="@{/produto/salvar}" th:object="${produto}">
        <input th:field="*{id}" type="hidden" />

        <label>Nome</label>
        <input type="text" id="nome" th:field="*{nome}">

        <label>Descrição</label>
        <input type="text" id="descricao" th:field="*{descricao}">

        <label>Valor</label>
        <input type="number" id="preco" th:field="*{valor}">

        <label>Quantidade</label>
        <input type="text" id="quantidade" th:field="*{quantidade}">

        <label>Imagem</label>
        <input type="text" id="imagem" th:field="*{imagem}">

        <div class="botoes">
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </div>
    </form>
</div>
</body>
</html>
